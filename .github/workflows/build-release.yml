name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_APP: apps/meshpad

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep '^version:' apps/meshpad/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bootstrap monorepo
        run: melos bootstrap

      - name: Codegen (Drift)
        run: cd packages/meshpad_core && dart run build_runner build --delete-conflicting-outputs

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build release APK
        run: flutter build apk --release
        working-directory: ${{ env.FLUTTER_APP }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "../../meshpad-${{ steps.version.outputs.version }}.apk"
        working-directory: ${{ env.FLUTTER_APP }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshpad-apk
          path: meshpad-*.apk
          retention-days: 90

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$env:USERPROFILE\.pub-cache\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path apps/meshpad/pubspec.yaml -Pattern '^version:' | Select-Object -First 1
          $version = ($line.Line -replace 'version:\s*', '' -replace '\+.*', '').Trim()
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Bootstrap monorepo
        run: melos bootstrap

      - name: Codegen (Drift)
        run: cd packages/meshpad_core; dart run build_runner build --delete-conflicting-outputs
        shell: pwsh

      - name: Build release Windows app
        run: flutter build windows --release
        working-directory: ${{ env.FLUTTER_APP }}

      - name: Package Windows release (exe + runtime)
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:FLUTTER_APP "build/windows/x64/runner/Release"
          $zipName = "meshpad-${{ steps.version.outputs.version }}-windows-x64.zip"
          if (-not (Test-Path $releaseDir)) {
            throw "Release folder not found: $releaseDir"
          }
          Compress-Archive -Path $releaseDir -DestinationPath $zipName -Force
          Write-Host "Created $zipName"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshpad-windows
          path: meshpad-*-windows-x64.zip
          retention-days: 90

  publish-release:
    name: GitHub Release
    needs: [build-android, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
