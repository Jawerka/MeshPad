name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_APP: apps/meshpad

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: cd packages/meshpad_core && dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: melos run analyze

      - name: Format check
        run: melos run format

      - name: Test
        run: melos run test

      - name: Flutter test
        run: melos run flutter:test

  build-hub-linux:
    name: Linux hub AOT
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: cd packages/meshpad_core && dart run build_runner build --delete-conflicting-outputs

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep '^version:' apps/meshpad/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build hub AOT binary
        run: |
          cd apps/meshpad_server
          dart compile exe bin/meshpad_server.dart -o meshpad-hub
          mv meshpad-hub "../../meshpad-hub-${{ steps.version.outputs.version }}-linux-x64"

      - name: Upload hub artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshpad-hub-linux
          path: meshpad-hub-*-linux-x64
          retention-days: 90

  build-linux:
    name: Linux x64 compile
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libsecret-1-dev \
            libayatana-appindicator3-dev

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: cd packages/meshpad_core && dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release
        run: flutter build linux --release
        working-directory: apps/meshpad

  build-android:
    name: Android APK
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep '^version:' apps/meshpad/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bootstrap monorepo
        run: melos bootstrap

      - name: Codegen (Drift)
        run: cd packages/meshpad_core && dart run build_runner build --delete-conflicting-outputs

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret; building unsigned APK"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/meshpad/android/meshpad-release.keystore
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../meshpad-release.keystore\n' \
            "$ANDROID_STORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > apps/meshpad/android/key.properties

      - name: Build release APK
        run: flutter build apk --release
        working-directory: ${{ env.FLUTTER_APP }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "../../meshpad-${{ steps.version.outputs.version }}.apk"
        working-directory: ${{ env.FLUTTER_APP }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshpad-apk
          path: meshpad-*.apk
          retention-days: 90

  build-windows:
    name: Windows x64
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSVC ATL (flutter_secure_storage)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          if (-not (Test-Path $installer)) {
            $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          }
          $installPath = & $vswhere -latest -products * -property installationPath
          if (-not $installPath) { throw "Visual Studio not found on runner" }
          Write-Host "Adding VC ATL/ATLMFC to $installPath"
          & $installer modify --installPath $installPath `
            --add Microsoft.VisualStudio.Component.VC.ATL `
            --add Microsoft.VisualStudio.Component.VC.ATLMFC `
            --quiet --wait --norestart
          if ($LASTEXITCODE -ne 0) { throw "Visual Studio modify failed with $LASTEXITCODE" }
          $atl = Get-ChildItem "$installPath\VC\Tools\MSVC\*\ATLMFC\include\atlstr.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $atl) { throw "atlstr.h still missing after ATL install" }
          Write-Host "Found $($atl.FullName)"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$env:USERPROFILE\.pub-cache\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $line = Select-String -Path apps/meshpad/pubspec.yaml -Pattern '^version:' | Select-Object -First 1
          $version = ($line.Line -replace 'version:\s*', '' -replace '\+.*', '').Trim()
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Bootstrap monorepo
        run: melos bootstrap

      - name: Codegen (Drift)
        run: cd packages/meshpad_core; dart run build_runner build --delete-conflicting-outputs
        shell: pwsh

      - name: Build release Windows app
        run: flutter build windows --release
        working-directory: ${{ env.FLUTTER_APP }}

      - name: Package Windows release (zip + Inno Setup installer)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDir = Join-Path $env:FLUTTER_APP "build/windows/x64/runner/Release"
          if (-not (Test-Path $releaseDir)) {
            throw "Release folder not found: $releaseDir"
          }
          $zipName = "meshpad-$version-windows-x64.zip"
          Compress-Archive -Path $releaseDir -DestinationPath $zipName -Force
          Write-Host "Created $zipName"
          winget install --id JRSoftware.InnoSetup -e --accept-source-agreements --accept-package-agreements --silent
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "${env:LOCALAPPDATA}\Programs\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after Inno Setup install" }
          & .\scripts\package-windows-installer.ps1 `
            -Version $version `
            -ReleaseDir $releaseDir `
            -OutputDir $PWD

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshpad-windows
          path: |
            meshpad-*-windows-x64.zip
            meshpad-*-windows-x64-setup.exe
          retention-days: 90

  publish-release:
    name: GitHub Release
    needs: [validate, build-hub-linux, build-linux, build-android, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Write release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          chmod +x scripts/extract-changelog-section.sh
          if ! scripts/extract-changelog-section.sh "$VERSION" CHANGELOG.md > release-notes.md; then
            echo "Failed to extract CHANGELOG section for $VERSION" >&2
            exit 1
          fi
          if [[ ! -s release-notes.md ]]; then
            echo "CHANGELOG section for $VERSION is empty" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/**/*
