name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: cd packages/meshpad_core && dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: melos run analyze

      - name: Format check
        run: melos run format

      - name: Test
        run: melos run test

      - name: Flutter test
        run: melos run flutter:test

  build-linux:
    name: Linux x64 compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libsecret-1-dev

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: cd packages/meshpad_core && dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release
        run: flutter build linux --release
        working-directory: apps/meshpad

  build-windows:
    name: Windows x64 compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSVC ATL (flutter_secure_storage)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $setup = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) { throw "Visual Studio C++ tools not found on runner" }
          Write-Host "Adding VC ATL to $installPath"
          & $setup modify --installPath $installPath --add Microsoft.VisualStudio.Component.VC.ATL --quiet --norestart --wait
          if ($LASTEXITCODE -ne 0) { throw "setup.exe modify failed with $LASTEXITCODE" }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$env:USERPROFILE\.pub-cache\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: cd packages/meshpad_core; dart run build_runner build --delete-conflicting-outputs
        shell: pwsh

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: apps/meshpad
