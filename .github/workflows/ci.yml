name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap
        run: melos bootstrap

      - name: Codegen
        run: cd packages/meshpad_core && dart run build_runner build

      - name: Analyze
        run: melos run analyze

      - name: Format check
        run: melos run format

      - name: Test
        run: melos run test
