name: meshpad
description: MeshPad — local-first Markdown notes in a chat-style feed.
publish_to: none
version: 0.2.5+1
resolution: workspace

environment:
  sdk: ^3.5.0

dependencies:
  connectivity_plus: ^6.1.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  meshpad_core:
    path: ../../packages/meshpad_core
  meshpad_api_client:
    path: ../../packages/meshpad_api_client
  meshpad_p2p:
    path: ../../packages/meshpad_p2p
  flutter_riverpod: ^2.6.1
  flutter_markdown: ^0.7.6+2
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  http: ^1.2.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  tray_manager: ^0.2.3
  window_manager: ^0.4.3
  workmanager: ^0.9.0+3
  sqlite3_flutter_libs: 0.5.42
  open_file: ^3.5.11
  desktop_drop: ^0.7.1
  video_player: ^2.9.3
  video_player_win: ^3.2.2
  audioplayers: ^6.1.0
  flutter_secure_storage: ^9.2.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/tray_icon.ico
