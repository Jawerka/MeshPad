name: meshpad
description: MeshPad — local-first Markdown notes in a chat-style feed.
publish_to: none
version: 0.1.0+1
resolution: workspace

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  meshpad_core:
    path: ../../packages/meshpad_core
  meshpad_p2p:
    path: ../../packages/meshpad_p2p
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
