name: meshpad_workspace
publish_to: none

environment:
  sdk: ^3.5.0

workspace:
  - apps/meshpad
  - apps/meshpad_server
  - packages/meshpad_api_client
  - packages/meshpad_core
  - packages/meshpad_p2p

dev_dependencies:
  melos: ^7.0.0

melos:
  scripts:
    analyze:
      run: melos exec -- dart analyze --fatal-infos
      description: Static analysis for all packages.

    test:
      run: melos exec --ignore="meshpad" --fail-fast -- dart test
      description: Unit tests in Dart packages (core, p2p).

    format:
      run: melos exec -- dart format --set-exit-if-changed .
      description: Check formatting.

    format:fix:
      run: melos exec -- dart format .
      description: Apply formatting.

    flutter:test:
      run: melos exec --scope="meshpad" -- flutter test
      description: Flutter widget/integration tests in the app.

    check:
      run: melos run analyze && melos run test && melos run flutter:test
      description: Local CI — analyze + all tests.

    build:android:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-android.ps1
      description: Release APK build; copies meshpad.apk to the phone sync folder.
